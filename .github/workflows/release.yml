name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - run: composer install --no-dev --no-interaction --optimize-autoloader
      - name: Build plugin zip
        run: |
          mkdir -p build/presence-api
          rsync -a --exclude-from='.distignore' ./ build/presence-api/
          cd build && zip -r presence-api.zip presence-api/
      - run: gh release create "${{ github.ref_name }}" build/presence-api.zip --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
